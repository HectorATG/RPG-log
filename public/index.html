<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="RPG LOG" />
    <meta name="theme-color" content="#0d0d18" />
    <meta name="description" content="Gamifica tu productividad personal con un sistema de RPG." />

    <title>RPG LOG</title>

    <!-- PWA manifest -->
    <link rel="manifest" href="/manifest.json" />

    <!-- Apple touch icons (iOS necesita estos para "Add to Home Screen") -->
    <link rel="apple-touch-icon" sizes="192x192" href="/logo192.png" />
    <link rel="apple-touch-icon" sizes="512x512" href="/logo512.png" />

    <!-- Favicon fallback -->
    <link rel="icon" type="image/png" sizes="192x192" href="/logo192.png" />
  </head>
  <body>
    <div id="root"></div>

    <script>
      // ── Service Worker ──────────────────────────────────────────
      // Se registra SOLO en producción (HTTPS).
      // En desarrollo (HTTP) se desregistra para evitar:
      //   1. Servir assets cacheados de builds anteriores
      //   2. Bloquear el evento beforeinstallprompt
      //   3. Interferir con el hot-reload de Vite/CRA

      (function () {
        if (!('serviceWorker' in navigator)) return;

        var isProduction = location.protocol === 'https:';

        if (isProduction) {
          // Producción → registrar SW
          window.addEventListener('load', function () {
            navigator.serviceWorker
              .register('/sw.js', { scope: '/' })
              .then(function (reg) {
                console.log('[SW] Registrado correctamente', reg.scope);
              })
              .catch(function (err) {
                console.warn('[SW] Error al registrar:', err.message);
              });
          });
        } else {
          // Desarrollo → limpiar todo para no interferir
          navigator.serviceWorker
            .getRegistrations()
            .then(function (regs) {
              regs.forEach(function (r) { r.unregister(); });
              if (regs.length) console.log('[SW] Desregistrado en modo desarrollo');
            })
            .catch(function () {});

          if (window.caches) {
            caches.keys().then(function (keys) {
              keys.forEach(function (k) { caches.delete(k); });
            }).catch(function () {});
          }
        }
      })();
    </script>
  </body>
</html>
